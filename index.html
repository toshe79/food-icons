<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FoodIcons">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Food Icon Generator</title>
<style>
:root{--bg:#0d0d1a;--surf:#161627;--surf2:#1e1e35;--border:#2a2a40;--acc:#7c3aed;--acc2:#c084fc;--green:#059669;--red:#dc2626;--orange:#d97706;--text:#e2e2f0;--muted:#666680}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);padding:12px 12px 90px;min-height:100vh}
.header{text-align:center;padding:10px 0 14px}
.header h1{font-size:1.35rem;color:var(--acc2)}
.header p{font-size:0.75rem;color:var(--muted);margin-top:3px}
.panel{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:12px}
.panel-title{font-size:.88rem;font-weight:700;color:var(--acc2);margin-bottom:9px}
textarea,input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.85rem;padding:10px 12px;outline:none;font-family:inherit}
textarea{resize:vertical;min-height:68px;line-height:1.5}
textarea:focus,input:focus,select:focus{border-color:var(--acc)}
select option{background:var(--surf2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 14px;border:none;border-radius:9px;cursor:pointer;font-size:.82rem;font-weight:700;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-p{background:var(--acc);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-r{background:var(--red);color:#fff}
.btn-o{background:var(--orange);color:#fff}
.btn-d{background:var(--surf2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:5px 9px;font-size:.68rem;border-radius:6px}
.btn-full{width:100%}
.row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.row .btn{flex:1;min-width:100px}
.prog-wrap{background:#1a1a2e;border-radius:8px;height:6px;overflow:hidden;display:none;margin-bottom:7px}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));width:0%;transition:width .4s}
#statusText{text-align:center;font-size:.75rem;color:var(--acc2);min-height:15px;margin-bottom:10px}
.stats{display:flex;justify-content:center;gap:14px;font-size:.73rem;color:var(--muted);margin-bottom:10px}
.stats b{color:var(--text)}
#searchBox{margin-bottom:10px}
.sel-bar{background:var(--surf2);border:1px solid var(--acc);border-radius:12px;padding:10px 12px;margin-bottom:10px;display:none;flex-direction:column;gap:8px}
.sel-bar.show{display:flex}
.sel-top{display:flex;align-items:center;gap:8px}
.sel-count{font-size:.8rem;color:var(--acc2);font-weight:700;flex:1}
.sel-actions{display:flex;gap:6px;flex-wrap:wrap}
.sel-actions .btn{flex:1;min-width:80px}
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:.75rem;font-weight:700;border:1px solid var(--border);background:var(--surf);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.cat-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.cat-section{margin-bottom:20px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.cat-icon{font-size:1.1rem}
.cat-name{font-size:.88rem;font-weight:700;color:var(--acc2);flex:1}
.cat-count{font-size:.72rem;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:10px 8px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .2s;position:relative}
.card.done{border-color:#7c3aed44}
.card.error{border-color:#dc262644}
.card.waiting{opacity:.4}
.card.custom{border-color:#05966988}
.card.custom.done{border-color:var(--green)}
.card.selected{border-color:var(--acc)!important;background:#7c3aed18}
.card.generating{border-color:var(--acc2)!important;animation:glow 1.2s ease-in-out infinite}
@keyframes glow{0%,100%{border-color:#c084fc22}50%{border-color:var(--acc2)}}
.gen-btn{position:absolute;top:5px;left:5px;width:26px;height:26px;background:var(--acc);border:none;border-radius:6px;color:#fff;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;z-index:3}
.card.custom:hover .gen-btn,.card.custom.waiting .gen-btn,.card.error .gen-btn{opacity:1}
.select-mode .gen-btn{display:none!important}
.chk{position:absolute;top:5px;right:5px;width:22px;height:22px;background:var(--surf2);border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75rem;opacity:0;transition:opacity .15s;z-index:2}
.card.selected .chk,.select-mode .card.done .chk{opacity:1}
.card.selected .chk{background:var(--acc);border-color:var(--acc);color:#fff}
.emoji-box{width:120px;height:120px;border-radius:10px;background:#ffffff08;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.emoji-box img{width:120px;height:120px;display:block;object-fit:contain}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.spinner{width:30px;height:30px;border:3px solid #7c3aed33;border-top-color:var(--acc2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-label{font-size:.58rem;color:var(--acc2)}
.lbl{font-size:.68rem;color:#aaa;text-align:center;line-height:1.3;word-break:break-word;max-width:125px}
.badge-my{font-size:.52rem;background:var(--green);color:#fff;border-radius:3px;padding:1px 4px;font-weight:700}
.card-actions{display:none;flex-direction:column;gap:3px;width:100%}
.card.done .card-actions,.card.error .card-actions{display:flex}
.select-mode .card-actions{display:none!important}
.err-lbl{font-size:.6rem;color:#f87171;text-align:center;padding:4px}
.sheet-bg{position:fixed;inset:0;background:#000b;display:none;align-items:flex-end;justify-content:center;z-index:100}
.sheet-bg.open{display:flex}
.sheet{background:var(--surf);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.sheet h3{color:var(--acc2);margin-bottom:14px}
.sheet label{font-size:.78rem;color:var(--muted);display:block;margin:10px 0 4px}
.sheet-btns{display:flex;gap:8px;margin-top:14px}
.confirm-bg{position:fixed;inset:0;background:#000b;display:none;align-items:center;justify-content:center;z-index:110;padding:20px}
.confirm-bg.open{display:flex}
.confirm{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:300px;width:100%;text-align:center}
.confirm h3{color:var(--acc2);margin-bottom:8px}
.confirm p{color:var(--muted);font-size:.82rem;margin-bottom:15px}
.confirm-btns{display:flex;gap:8px}
.install-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:50}
.install-bar span{font-size:.8rem;color:var(--muted);flex:1}
.install-bar.hidden{display:none}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--acc);color:var(--acc2);padding:9px 18px;border-radius:30px;font-size:.8rem;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:200;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.offline{background:#7c2d12;border:1px solid #ea580c;border-radius:9px;padding:9px 12px;font-size:.78rem;color:#fed7aa;text-align:center;margin-bottom:10px;display:none}
.offline.show{display:block}
.info-box{background:#1e1e35;border:1px solid #7c3aed44;border-radius:10px;padding:10px 12px;font-size:.75rem;color:var(--muted);margin-bottom:10px;line-height:1.6}
.info-box b{color:var(--acc2)}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loading p{color:var(--acc2);font-size:.9rem}
.loading .spinner{width:48px;height:48px;border-width:4px}
</style>
</head>
<body>

<div class="loading" id="loadingScreen">
  <div class="spinner"></div>
  <p>Зареждане...</p>
</div>

<div class="header">
  <h1>&#127869; Food Icon Generator</h1>
  <p>Реалистични икони &#183; Прозрачен фон</p>
</div>
<div class="offline" id="offlineNotice">&#128245; Офлайн</div>
<div class="info-box"><b>&#9989; 59 готови икони</b> &#8212; зареждат се моментално<br><b>&#127912; DALL-E 3</b> &#8212; за нови продукти</div>

<div class="panel">
  <div class="panel-title">&#10133; Собствени продукти</div>
  <button class="btn btn-p btn-full" onclick="openAddSheet()">&#10133; Добави нов продукт / ястие</button>
  <div class="row"><button class="btn btn-d btn-sm" style="flex:1" onclick="clearCustom()">&#128465; Изчисти всички мои</button></div>
</div>
<div class="panel">
  <div class="row" style="margin-top:0">
    <button class="btn btn-g btn-full" onclick="downloadAll()">&#11015; Свали всички (ZIP)</button>
  </div>
  <div class="row">
    <button class="btn btn-o btn-full" id="selModeBtn" onclick="toggleSelMode()">&#9745; Режим на избор</button>
  </div>
</div>

<div class="sel-bar" id="selBar">
  <div class="sel-top"><span class="sel-count" id="selCount">0 избрани</span><button class="btn btn-r btn-sm" onclick="toggleSelMode()">&#10005; Изход</button></div>
  <div class="sel-actions">
    <button class="btn btn-d btn-sm" onclick="selectAll()">&#9989; Всички</button>
    <button class="btn btn-d btn-sm" onclick="deselectAll()">&#10007; Нито едно</button>
    <button class="btn btn-g btn-sm" id="dlSelBtn" onclick="downloadSelected()" disabled>&#11015; Свали</button>
  </div>
</div>

<div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
<div id="statusText"></div>
<div class="stats"><span>Общо: <b id="sTotal">0</b></span><span>Готови: <b id="sDone">0</b></span><span>Мои: <b id="sCustom">0</b></span></div>
<input type="search" id="searchBox" placeholder="&#128269; Търси продукт..." oninput="renderAll()">
<div class="cat-tabs" id="catTabs"></div>
<div id="mainContent"></div>

<div class="sheet-bg" id="addSheet" onclick="if(event.target===this)closeAddSheet()">
  <div class="sheet">
    <h3 id="sheetTitle">&#10133; Добави нов продукт</h3>
    <label>Едно име</label><input type="text" id="newName" placeholder="напр. Ягода">
    <label>Категория</label>
    <select id="newCat">
      <option value="veg">&#129382; Зеленчуци</option>
      <option value="meat">&#127831; Месо &amp; Птиче</option>
      <option value="fish">&#128031; Риба</option>
      <option value="soup">&#127858; Супи</option>
      <option value="cooked">&#127869; Готвени ястия</option>
      <option value="sides">&#129301; Гарнитури</option>
      <option value="grains">&#127806; Зърнени &amp; Хляб</option>
      <option value="dairy">&#129371; Млечни &amp; Яйца</option>
      <option value="custom">&#11088; Мои продукти</option>
    </select>
    <label>Или няколко (по един на ред)</label>
    <textarea id="newBulk" placeholder="Ягода&#10;Банан&#10;Круша"></textarea>
    <div class="sheet-btns">
      <button class="btn btn-d btn-full" onclick="closeAddSheet()">Отказ</button>
      <button class="btn btn-p btn-full" id="sheetConfirmBtn" onclick="confirmAdd()">&#9989; Добави и генерирай</button>
    </div>
  </div>
</div>

<div class="confirm-bg" id="delModal">
  <div class="confirm">
    <h3>&#128465; Изтрий?</h3><p id="delName"></p>
    <div class="confirm-btns">
      <button class="btn btn-d btn-full" onclick="closeDelModal()">Отказ</button>
      <button class="btn btn-r btn-full" onclick="confirmDelete()">Изтрий</button>
    </div>
  </div>
</div>

<div class="install-bar hidden" id="installBar">
  <span>&#128242; Инсталирай!</span>
  <button class="btn btn-p btn-sm" id="installBtn">Инсталирай</button>
  <button class="btn btn-d btn-sm" onclick="document.getElementById('installBar').classList.add('hidden')">&#10005;</button>
</div>
<div class="toast" id="toast"></div>

<script src="icons.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
var CATS=[
  {id:"veg",name:"Зеленчуци",icon:"🥦"},
  {id:"meat",name:"Месо & Птиче",icon:"🍗"},
  {id:"fish",name:"Риба",icon:"🐟"},
  {id:"soup",name:"Супи",icon:"🍲"},
  {id:"cooked",name:"Готвени ястия",icon:"🍽️"},
  {id:"sides",name:"Гарнитури",icon:"🥕"},
  {id:"grains",name:"Зърнени & Хляб",icon:"🌾"},
  {id:"dairy",name:"Млечни & Яйца",icon:"🥛"},
  {id:"custom",name:"Мои продукти",icon:"⭐"}
];
var DEF=[
  {slug:"cucumber",label:"Краставица",cat:"veg"},
  {slug:"tomato",label:"Домат",cat:"veg"},
  {slug:"potato",label:"Картоф",cat:"veg"},
  {slug:"carrot",label:"Морков",cat:"veg"},
  {slug:"zucchini",label:"Тиквичка",cat:"veg"},

  {slug:"spinach",label:"Спанак",cat:"veg"},
  {slug:"olives",label:"Маслини",cat:"veg"},
  {slug:"bell_pepper",label:"Чушка",cat:"veg"},
  {slug:"chicken_breast",label:"Пилешко филе",cat:"meat"},
  {slug:"chicken_drumstick",label:"Пилешко бутче без кожа",cat:"meat"},
  {slug:"turkey_breast",label:"Пуешко филе",cat:"meat"},
  {slug:"beef_boiled",label:"Телешко варено",cat:"meat"},
  {slug:"chicken_breast_steamed",label:"Пилешко филе на пара",cat:"meat"},
  {slug:"turkey_breast_steamed",label:"Пуешко филе на пара",cat:"meat"},
  {slug:"beef_boiled_sliced",label:"Варено телешко",cat:"meat"},
  {slug:"turkey_boiled",label:"Варено пуешко",cat:"meat"},
  {slug:"salmon",label:"Сьомга",cat:"fish"},
  {slug:"cod",label:"Треска",cat:"fish"},
  {slug:"mackerel",label:"Скумрия",cat:"fish"},
  {slug:"beef_soup",label:"Телешка супа",cat:"soup"},
  {slug:"vegetable_soup",label:"Зеленчукова супа",cat:"soup"},
  {slug:"chicken_noodle_soup",label:"Пилешка супа с фиде",cat:"soup"},
  {slug:"pumpkin_cream_soup",label:"Крем супа тиква",cat:"soup"},
  {slug:"potato_cream_soup",label:"Крем супа картофи",cat:"soup"},
  {slug:"lentil_soup",label:"Леща пасирана",cat:"soup"},

  {slug:"carrot_cream_soup",label:"Морковена крем супа",cat:"soup"},
  {slug:"chicken_potatoes_baked",label:"Пиле с картофи на фурна",cat:"cooked"},
  {slug:"stuffed_peppers_rice",label:"Пълнени чушки с ориз",cat:"cooked"},
  {slug:"turkey_moussaka",label:"Мусака пуешка",cat:"cooked"},
  {slug:"rice_veg_cottage",label:"Ориз със зеленчуци и извара",cat:"cooked"},
  {slug:"spaghetti_tomato",label:"Спагети с доматен сос",cat:"cooked"},
  {slug:"chicken_with_rice",label:"Варено пиле с ориз",cat:"cooked"},
  {slug:"fish_with_potatoes",label:"Варена риба с картофи",cat:"cooked"},
  {slug:"rice_with_zucchini",label:"Ориз със задушени тиквички",cat:"cooked"},
  {slug:"boiled_potatoes",label:"Варени картофи",cat:"sides"},

  {slug:"boiled_carrots",label:"Варени моркови",cat:"sides"},
  {slug:"mashed_potatoes",label:"Картофено пюре",cat:"sides"},

  {slug:"boiled_rice",label:"Ориз варен",cat:"sides"},
  {slug:"rice_patties",label:"Оризови кюфтета",cat:"sides"},
  {slug:"raw_rice",label:"Ориз суров",cat:"grains"},
  {slug:"oats",label:"Овесени ядки",cat:"grains"},
  {slug:"macaroni_dry",label:"Макарони сурови",cat:"grains"},
  {slug:"corn_spaghetti",label:"Спагети царевични",cat:"grains"},
  {slug:"soda_bread",label:"Хляб содов",cat:"grains"},
  {slug:"red_lentils",label:"Червена леща сурова",cat:"grains"},
  {slug:"chickpeas_boiled",label:"Нахут варен",cat:"grains"},
  {slug:"egg",label:"Яйце",cat:"dairy"},
  {slug:"cottage_cheese",label:"Извара обезмаслена",cat:"dairy"},
  {slug:"tofu",label:"Тофу",cat:"dairy"},
  {slug:"yogurt",label:"Кисело мляко 2%",cat:"dairy"},
  {slug:"cows_milk",label:"Краве мляко",cat:"dairy"},
  {slug:"fruit_yogurt",label:"Плодово мляко",cat:"dairy"},
  {slug:"rice_porridge",label:"Оризова каша",cat:"dairy"},
  {slug:"oatmeal_banana",label:"Овесена каша с банан",cat:"dairy"},
  {slug:"baked_apple",label:"Печена ябълка",cat:"dairy"}
];

var LS={c:"feg_c7",p:"feg_dalle2",a:"feg_att4"};
function ld(k){try{return JSON.parse(localStorage.getItem(k)||"null")}catch(e){return null}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
var custom=ld(LS.c)||[];
var aiPngs=ld(LS.p)||{};
var att=ld(LS.a)||{};
var selMode=false,running=false,stopped=false;
var sel=new Set(),activeTab="all",delTarget=null;

function allFoods(){var ds=new Set(DEF.map(function(f){return f.slug}));return DEF.concat(custom.filter(function(f){return!ds.has(f.slug)}))}
function getPng(s){return aiPngs[s]||(typeof SPRITE_ICONS!=="undefined"&&SPRITE_ICONS[s])||null}
function hasPng(s){return!!(aiPngs[s]||(typeof SPRITE_ICONS!=="undefined"&&SPRITE_ICONS[s]))}
function slugify(s){var m={"а":"a","б":"b","в":"v","г":"g","д":"d","е":"e","ж":"zh","з":"z","и":"i","й":"y","к":"k","л":"l","м":"m","н":"n","о":"o","п":"p","р":"r","с":"s","т":"t","у":"u","ф":"f","х":"h","ц":"ts","ч":"ch","ш":"sh","щ":"sht","ъ":"a","ь":"","ю":"yu","я":"ya"};return s.toLowerCase().split("").map(function(c){return m[c]||c}).join("").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,40)}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
function ss(t){document.getElementById("statusText").textContent=t}

function buildTabs(){
  var el=document.getElementById("catTabs");el.innerHTML="";
  function mk(id,txt){var d=document.createElement("div");d.className="cat-tab"+(activeTab===id?" active":"");d.innerHTML=txt;d.onclick=function(){activeTab=id;buildTabs();renderAll()};el.appendChild(d)}
  mk("all","🍽️ Всички");
  var foods=allFoods();
  CATS.forEach(function(c){if(foods.some(function(f){return f.cat===c.id}))mk(c.id,c.icon+" "+c.name)});
}

function renderAll(){
  var filter=document.getElementById("searchBox").value.toLowerCase();
  var ds=new Set(DEF.map(function(f){return f.slug}));
  var mc=document.getElementById("mainContent");mc.innerHTML="";mc.className=selMode?"select-mode":"";
  var foods=allFoods();
  var cats=activeTab==="all"?CATS.filter(function(c){return foods.some(function(f){return f.cat===c.id})}):CATS.filter(function(c){return c.id===activeTab});
  var shown=0;
  cats.forEach(function(cat){
    var fc=foods.filter(function(f){return f.cat===cat.id&&(!filter||f.label.toLowerCase().indexOf(filter)>=0)});
    if(!fc.length)return;shown+=fc.length;
    var done=fc.filter(function(f){return hasPng(f.slug)}).length;
    var sec=document.createElement("div");sec.className="cat-section";
    var sec=document.createElement("div");sec.className="cat-section";
    var hdr=document.createElement("div");hdr.className="cat-header";
    hdr.innerHTML='<span class="cat-icon">'+cat.icon+'</span><span class="cat-name">'+cat.name+'</span><span class="cat-count">'+done+'/'+fc.length+'</span>';
    if(selMode){var sb=document.createElement("button");sb.className="btn btn-d btn-sm";sb.textContent="Избери";sb.onclick=(function(id){return function(){selCat(id)}})(cat.id);hdr.appendChild(sb)}
    sec.appendChild(hdr);
    var gridDiv=document.createElement("div");gridDiv.className="grid";gridDiv.id="g-"+cat.id;sec.appendChild(gridDiv);
    mc.appendChild(sec);
    var grid=gridDiv;
        fc.forEach(function(food){
      var slug=food.slug,label=food.label;
      var isMy=!ds.has(slug),png=getPng(slug),isSel=sel.has(slug);
      var card=document.createElement("div");
      card.className="card"+(png?" done":" waiting")+(isMy?" custom":"")+(isSel?" selected":"");
      card.id="card-"+slug;
      if(selMode&&png)card.onclick=function(){toggleSel(slug)};

      // gen button
      if(isMy){
        var gb=document.createElement("button");
        gb.className="gen-btn";gb.innerHTML="&#127912;";
        gb.onclick=function(e){e.stopPropagation();genOne(slug)};
        card.appendChild(gb);
      }
      // checkbox
      var chk=document.createElement("div");chk.className="chk";chk.textContent=isSel?"✓":"";card.appendChild(chk);
      // image box
      var box=document.createElement("div");box.className="emoji-box";box.id="box-"+slug;
      if(png){var img=document.createElement("img");img.src=png;img.alt="";box.appendChild(img)}
      else{var sp=document.createElement("span");sp.style.cssText="font-size:.55rem;color:#555;text-align:center;padding:4px";sp.textContent=label.slice(0,14);box.appendChild(sp)}
      card.appendChild(box);
      // label
      var lbl=document.createElement("div");lbl.className="lbl";
      if(isMy){var b=document.createElement("span");b.className="badge-my";b.textContent="МОЙ";lbl.appendChild(b);lbl.appendChild(document.createTextNode(" "))}
      lbl.appendChild(document.createTextNode(label));card.appendChild(lbl);
      // actions
      var acts=document.createElement("div");acts.className="card-actions";
      if(isMy){
        var r=document.createElement("button");r.className="btn btn-p btn-sm btn-full";r.innerHTML="&#127912; Регенерирай";r.onclick=function(){genOne(slug)};acts.appendChild(r);
      }
      var dl=document.createElement("button");dl.className="btn btn-d btn-sm btn-full";dl.innerHTML="&#11015; PNG";dl.onclick=function(){dlOne(slug)};acts.appendChild(dl);
      if(isMy){
        var ec=document.createElement("button");ec.className="btn btn-o btn-sm btn-full";ec.innerHTML="&#128194; Смени";ec.onclick=function(){openEditCat(slug,label,food.cat)};acts.appendChild(ec);
        var del=document.createElement("button");del.className="btn btn-r btn-sm btn-full";del.innerHTML="&#128465; Изтрий";del.onclick=function(){askDel(slug,label)};acts.appendChild(del);
      }
      card.appendChild(acts);
      grid.appendChild(card);
    });
  });
  if(!shown)mc.innerHTML='<p style="color:#444;text-align:center;padding:30px">Няма резултати</p>';
  updateStats();updateSelBar();
}

function setSpinner(slug,msg){var b=document.getElementById("box-"+slug);if(b)b.innerHTML='<div class="spinner-wrap"><div class="spinner"></div><div class="gen-label">'+(msg||"...")+"</div></div>";var c=document.getElementById("card-"+slug);if(c){c.classList.remove("done","error","waiting");c.classList.add("generating")}}
function setResult(slug,png){var b=document.getElementById("box-"+slug);if(b)b.innerHTML='<img src="'+png+'" alt="">';var c=document.getElementById("card-"+slug);if(c){c.classList.remove("waiting","error","generating");c.classList.add("done")}}
function setErr(slug,msg){var b=document.getElementById("box-"+slug);if(b)b.innerHTML='<div class="err-lbl">&#10060; '+msg+"</div>";var c=document.getElementById("card-"+slug);if(c){c.classList.remove("waiting","generating");c.classList.add("error","done")}}

function toggleSelMode(){selMode=!selMode;if(!selMode)sel.clear();var btn=document.getElementById("selModeBtn");btn.textContent=selMode?"✕ Изход":"☑ Режим на избор";btn.className=selMode?"btn btn-r btn-full":"btn btn-o btn-full";renderAll()}
function toggleSel(slug){sel.has(slug)?sel.delete(slug):sel.add(slug);var c=document.getElementById("card-"+slug);if(c){c.classList.toggle("selected",sel.has(slug));var ch=c.querySelector(".chk");if(ch)ch.textContent=sel.has(slug)?"✓":""}updateSelBar()}
function selectAll(){allFoods().filter(function(f){return hasPng(f.slug)}).forEach(function(f){sel.add(f.slug)});renderAll()}
function deselectAll(){sel.clear();renderAll()}
function selCat(catId){allFoods().filter(function(f){return f.cat===catId&&hasPng(f.slug)}).forEach(function(f){sel.add(f.slug)});renderAll()}
function updateSelBar(){document.getElementById("selBar").classList.toggle("show",selMode);document.getElementById("selCount").textContent=sel.size+" избрани";document.getElementById("dlSelBtn").disabled=sel.size===0}
function updateStats(){var foods=allFoods();document.getElementById("sTotal").textContent=foods.length;document.getElementById("sDone").textContent=foods.filter(function(f){return hasPng(f.slug)}).length;document.getElementById("sCustom").textContent=custom.length}

function openAddSheet(){document.getElementById("newName").value="";document.getElementById("newBulk").value="";document.getElementById("newCat").value="custom";document.getElementById("sheetTitle").textContent="➕ Добави нов продукт";document.getElementById("sheetConfirmBtn").textContent="✅ Добави и генерирай";document.getElementById("sheetConfirmBtn").onclick=confirmAdd;document.getElementById("addSheet").classList.add("open");setTimeout(function(){document.getElementById("newName").focus()},150)}
function closeAddSheet(){document.getElementById("addSheet").classList.remove("open")}
async function confirmAdd(){
  var name=document.getElementById("newName").value.trim();
  var bulk=document.getElementById("newBulk").value.trim();
  var cat=document.getElementById("newCat").value;
  var lines=[];if(name)lines.push(name);if(bulk)bulk.split(/[\n,]+/).map(function(s){return s.trim()}).filter(Boolean).forEach(function(s){lines.push(s)});
  if(!lines.length)return toast("Въведи поне един продукт!");
  var exist=new Set(allFoods().map(function(f){return f.slug}));var newItems=[];
  lines.forEach(function(label){var slug=slugify(label);if(!exist.has(slug)){custom.push({slug:slug,label:label,cat:cat});exist.add(slug);newItems.push({slug:slug,label:label})}});
  sv(LS.c,custom);closeAddSheet();buildTabs();renderAll();
  if(newItems.length){toast("✅ Добавени: "+newItems.length+" — генерирам...");for(var i=0;i<newItems.length;i++){await genOne(newItems[i].slug);if(newItems.length>1)await sleep(1000)}}
}
function clearCustom(){if(!custom.length)return toast("Няма собствени продукти");custom.forEach(function(f){delete aiPngs[f.slug];delete att[f.slug]});custom=[];sv(LS.c,custom);sv(LS.p,aiPngs);sv(LS.a,att);buildTabs();renderAll();toast("🗑 Изчистени")}
function openEditCat(slug,label,currentCat){document.getElementById("newName").value=label;document.getElementById("newCat").value=currentCat;document.getElementById("newBulk").value="";document.getElementById("sheetTitle").textContent="📂 Смени категория";document.getElementById("sheetConfirmBtn").textContent="✅ Запази";document.getElementById("sheetConfirmBtn").onclick=function(){var f=custom.find(function(f){return f.slug===slug});if(f){f.cat=document.getElementById("newCat").value;sv(LS.c,custom)}closeAddSheet();buildTabs();renderAll();toast("✅ Сменена")};document.getElementById("addSheet").classList.add("open")}
function askDel(slug,label){delTarget=slug;document.getElementById("delName").textContent='"'+label+'"';document.getElementById("delModal").classList.add("open")}
function closeDelModal(){delTarget=null;document.getElementById("delModal").classList.remove("open")}
function confirmDelete(){if(!delTarget)return closeDelModal();custom=custom.filter(function(f){return f.slug!==delTarget});delete aiPngs[delTarget];delete att[delTarget];sv(LS.c,custom);sv(LS.p,aiPngs);sv(LS.a,att);closeDelModal();buildTabs();renderAll();toast("🗑 Изтрит")}

async function callDallE(label){
  var prompt="A single "+label+" food item. Highly realistic 3D render. Studio lighting. White background. No text. No shadows. Centered. Photorealistic app icon.";
  for(var i=0;i<3;i++){
    if(stopped)return null;
    try{
      var res=await fetch("/.netlify/functions/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:prompt})});
      var d=await res.json();
      if(d.b64)return"data:image/png;base64,"+d.b64;
      await sleep(3000);
    }catch(e){await sleep(3000)}
  }
  return null;
}

async function genOne(slug){
  if(running)return toast("⚠️ Генерирането е в ход");
  var food=allFoods().find(function(f){return f.slug===slug});if(!food)return;
  if(!custom.find(function(f){return f.slug===slug}))return toast("Тази икона е вградена!");
  running=true;stopped=false;
  ss("🎨 DALL-E 3: "+food.label);setSpinner(slug,"DALL·E 3");
  att[slug]=(att[slug]||0)+1;sv(LS.a,att);
  var png=await callDallE(food.label);
  if(png){aiPngs[slug]=png;sv(LS.p,aiPngs);setResult(slug,png);toast("✅ Готово!")}
  else{setErr(slug,"Грешка");toast("❌ Неуспешно")}
  ss("");running=false;updateStats();
}

async function fetchB64(slug){
  var png=getPng(slug);if(!png)return null;
  if(png.indexOf("data:")===0)return png.split(",")[1];
  try{var res=await fetch(png);var blob=await res.blob();return new Promise(function(r){var fr=new FileReader();fr.onload=function(){r(fr.result.split(",")[1])};fr.readAsDataURL(blob)})}catch(e){return null}
}
function dlOne(slug){
  var png=getPng(slug);if(!png)return toast("Няма икона");
  var food=allFoods().find(function(f){return f.slug===slug});
  var a=document.createElement("a");a.href=png;a.download=(food?food.slug:slug)+".png";document.body.appendChild(a);a.click();document.body.removeChild(a);
}
async function downloadSelected(){
  if(!sel.size)return toast("Нищо не е избрано");
  var btn=document.getElementById("dlSelBtn");btn.disabled=true;btn.textContent="⏳...";
  var zip=new JSZip();var folder=zip.folder("food_icons");
  for(var slug of sel){var b=await fetchB64(slug);if(b)folder.file(slug+".png",b,{base64:true})}
  var blob=await zip.generateAsync({type:"blob"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="food_icons_selected.zip";document.body.appendChild(a);a.click();document.body.removeChild(a);
  btn.disabled=false;btn.textContent="⬇ Свали";toast("✅ "+sel.size+" икони");
}
async function downloadAll(){
  var zip=new JSZip();
  for(var ci=0;ci<CATS.length;ci++){
    var cat=CATS[ci];
    var fc=allFoods().filter(function(f){return f.cat===cat.id&&hasPng(f.slug)});
    if(!fc.length)continue;
    var folder=zip.folder(cat.name);
    for(var fi=0;fi<fc.length;fi++){var b=await fetchB64(fc[fi].slug);if(b)folder.file(fc[fi].slug+".png",b,{base64:true})}
  }
  var blob=await zip.generateAsync({type:"blob"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="food_icons.zip";document.body.appendChild(a);a.click();document.body.removeChild(a);
}

var _tt;
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove("show")},3000)}

if("serviceWorker"in navigator)window.addEventListener("load",function(){navigator.serviceWorker.register("./sw.js")});
var dp;
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();dp=e;document.getElementById("installBar").classList.remove("hidden")});
document.getElementById("installBtn").addEventListener("click",async function(){if(!dp)return;dp.prompt();var r=await dp.userChoice;dp=null;document.getElementById("installBar").classList.add("hidden");if(r.outcome==="accepted")toast("✅ Инсталирано!")});
window.addEventListener("online",function(){document.getElementById("offlineNotice").classList.remove("show")});
window.addEventListener("offline",function(){document.getElementById("offlineNotice").classList.add("show")});
if(!navigator.onLine)document.getElementById("offlineNotice").classList.add("show");

document.getElementById("loadingScreen").style.display="none";
buildTabs();
renderAll();
</script>
</body>
